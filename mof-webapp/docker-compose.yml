
services:
  postgres:
    image: postgres:16-alpine
    container_name: mof-postgres
    environment:
      POSTGRES_DB: mof
      POSTGRES_USER: mof
      POSTGRES_PASSWORD: mof
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mof"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mof-backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://mof:mof@postgres:5432/mof
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mof-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
